services:
  mongo:
    image: mongo:4.4
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-obrasflow}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?set MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - crm_internal

  wekan:
    image: wekanteam/wekan:v7.60
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      ROOT_URL: ${WEKAN_ROOT_URL:-http://127.0.0.1:8081}
      WITH_API: "true"
      MONGO_URL: mongodb://${MONGO_ROOT_USER:-obrasflow}:${MONGO_ROOT_PASSWORD}@mongo:27017/wekan?authSource=admin
      MAIL_URL: ${WEKAN_MAIL_URL:-smtp://localhost:1025}
      MAIL_FROM: ${WEKAN_MAIL_FROM:-no-reply@obrasflow.com}
      BROWSER_POLICY_ENABLED: "false"
      ACCOUNTS_PASSWORD_RESET: "false"
      ACCOUNTS_REGISTRATION_FORM: "Disabled"
    ports:
      - "127.0.0.1:8081:8080"
    networks:
      - crm_internal

networks:
  crm_internal:
    driver: bridge

volumes:
  mongo_data:
