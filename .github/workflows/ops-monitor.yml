name: ops-monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check app health
        run: |
          curl -fsS "https://planobras.vercel.app/api/health" >/tmp/health.json
          cat /tmp/health.json

      - name: Check ops health
        run: |
          curl -fsS "https://planobras.vercel.app/api/health/ops" >/tmp/ops.json
          cat /tmp/ops.json

      - name: Check queue metrics
        run: |
          curl -fsS "https://planobras.vercel.app/api/queue/metrics" >/tmp/queue.json
          cat /tmp/queue.json

      - name: Enforce SLO thresholds
        env:
          NEXT_PUBLIC_APP_URL: https://planobras.vercel.app
        run: npm run ops:slo-check
