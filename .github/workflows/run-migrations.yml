name: run-catchup-migrations

on:
  workflow_dispatch:
    inputs:
      db_password:
        description: 'Supabase DB password'
        required: true
        type: string

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Apply catchup migrations
        env:
          PGPASSWORD: ${{ inputs.db_password }}
        run: |
          psql \
            "postgres://postgres@db.dskcjkrgzwvsjdahfpgd.supabase.co:5432/postgres?sslmode=require" \
            -v ON_ERROR_STOP=0 \
            -f supabase/migrations/0007_add_relatorio_formato.sql \
            -f supabase/migrations/0022_portal_shares.sql \
            -f supabase/migrations/0023_enterprise_governance_foundations.sql \
            -f supabase/migrations/0024_reports_portal_diario_observability.sql \
            -f supabase/migrations/0025_full_execution_workflows.sql \
            -f supabase/migrations/0026_enterprise_completion_pack.sql \
            2>&1 | tee /tmp/migration_output.txt
          echo "Exit code: $?"
          cat /tmp/migration_output.txt

      - name: Verify migrations
        env:
          PGPASSWORD: ${{ inputs.db_password }}
        run: |
          psql \
            "postgres://postgres@db.dskcjkrgzwvsjdahfpgd.supabase.co:5432/postgres?sslmode=require" \
            -c "SELECT tablename FROM pg_tables WHERE schemaname='public' ORDER BY tablename;" \
            2>&1
